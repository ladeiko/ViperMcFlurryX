language: objective-c
osx_image: xcode15.3

branches:
  only:
    - master

env:
  - LC_CTYPE=en_US.UTF-8 LANG=en_US.UTF-8

before_install:
  - gem install cocoapods
  - gem install xcpretty -N

script:
  - set -o pipefail
  - cd Example
  - pod install 
  - xcodebuild test -enableCodeCoverage YES -workspace ViperMcFlurry.xcworkspace -scheme ViperMcFlurry-Example -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15' ONLY_ACTIVE_ARCH=NO | xcpretty -c
